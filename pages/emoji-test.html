<body>
<h1>Emoji Width: Canvas vs DOM — Multi-Font Sweep</h1>
<p class="sub">Tests whether emoji canvas/DOM diff is constant across fonts (font-independent) or varies per font.</p>
<nav id="probeRail" class="probe-rail" aria-label="Emoji probe presets"></nav>
<section id="presetCardGrid" class="preset-card-grid" aria-label="Emoji preset cards"></section>
<section id="contextCardGrid" class="context-card-grid" aria-label="Emoji context cards"></section>
<section id="routeCardGrid" class="route-card-grid" aria-label="Emoji scenario links"></section>
<div id="summaryPanel" class="panel" hidden></div>
<section id="sizeSummaryGrid" class="summary-grid" hidden aria-label="Emoji size summary cards"></section>
<section id="fontSummaryGrid" class="font-summary-grid" hidden aria-label="Emoji font summary cards"></section>
<section id="detailPanel" class="detail-panel" hidden aria-live="polite"></section>
<div id="output">Running...</div>
<script type="module">
import { clearNavigationReport, publishNavigationPhase, publishNavigationReport } from './report-utils.ts'
import { EMOJI_PROBE_PRESETS, findEmojiProbePreset } from './probe-presets.ts'

const emoji = [
  // Basic smileys
  '\u{1F600}','\u{1F602}','\u{1F972}','\u{1F60D}','\u{1F914}','\u{1F634}','\u{1F92F}','\u{1F973}',
  // Hand gestures
  '\u{1F44D}','\u{1F44E}','\u{1F44F}','\u{1F91D}','\u270C\uFE0F','\u{1F91E}','\u{1FAF6}',
  // People
  '\u{1F476}','\u{1F466}','\u{1F469}','\u{1F474}',
  // Animals
  '\u{1F98A}','\u{1F415}','\u{1F431}','\u{1F981}','\u{1F418}','\u{1F98B}','\u{1F40D}',
  // Nature
  '\u{1F338}','\u{1F30D}','\u2B50','\u{1F525}','\u{1F4A7}','\u2744\uFE0F','\u{1F308}',
  // Food
  '\u{1F34E}','\u{1F355}','\u{1F363}','\u{1F9C1}','\u2615','\u{1F37A}',
  // Objects
  '\u{1F3E0}','\u{1F680}','\u{1F3AF}','\u{1F4A1}','\u{1F4F1}','\u{1F511}','\u{1F48E}',
  // Flags
  '\u{1F1FA}\u{1F1F8}','\u{1F1EF}\u{1F1F5}','\u{1F1EB}\u{1F1F7}','\u{1F1E9}\u{1F1EA}','\u{1F1E8}\u{1F1F3}','\u{1F1E7}\u{1F1F7}',
  // Skin tone variants
  '\u{1F44D}\u{1F3FB}','\u{1F44D}\u{1F3FD}','\u{1F44D}\u{1F3FF}',
  // Misc
  '\u274C','\u2705','\u2764\uFE0F','\u{1F494}',
];

const fonts = [
  '"Helvetica Neue", Helvetica, Arial, sans-serif',
  'Georgia, "Times New Roman", serif',
  'Arial, sans-serif',
  '"Times New Roman", Times, serif',
  'Verdana, Geneva, sans-serif',
  '"Courier New", Courier, monospace',
  '"Trebuchet MS", Helvetica, sans-serif',
];

const defaultPreset = EMOJI_PROBE_PRESETS[0];
if (defaultPreset === undefined) throw new Error('emoji probe presets missing');
const defaultSizes = defaultPreset.sizes;
const ASSET_PREVIEW_SIZES = [48, 72, 96, 144];
const RELATED_ASSETS = [
  {
    key: 'openai',
    label: 'OpenAI',
    src: '/assets/openai-symbol.svg',
    sourceHref: '/assets/openai-symbol.svg',
  },
  {
    key: 'claude',
    label: 'Claude',
    src: '/assets/claude-symbol.svg',
    sourceHref: '/assets/claude-symbol.svg',
  },
];

const params = new URLSearchParams(location.search);
const requestedPreset = findPresetParam(params.get('preset'));
const requestId = params.get('requestId') ?? undefined;
const reportRequested = params.get('report') === '1';
const thresholdPx = parseThresholdParam(params.get('threshold'), requestedPreset?.threshold ?? defaultPreset.threshold);
const sizes = parseNumberListParam(params.get('sizes'), requestedPreset?.sizes ?? defaultSizes);
const outputNode = document.getElementById('output');
if (!(outputNode instanceof HTMLDivElement)) throw new Error('#output not found');
const summaryNode = document.getElementById('summaryPanel');
if (!(summaryNode instanceof HTMLDivElement)) throw new Error('#summaryPanel not found');
const routeCardGridNode = document.getElementById('routeCardGrid');
if (!(routeCardGridNode instanceof HTMLElement)) throw new Error('#routeCardGrid not found');
const summaryGridNode = document.getElementById('sizeSummaryGrid');
if (!(summaryGridNode instanceof HTMLElement)) throw new Error('#sizeSummaryGrid not found');
const fontSummaryGridNode = document.getElementById('fontSummaryGrid');
if (!(fontSummaryGridNode instanceof HTMLElement)) throw new Error('#fontSummaryGrid not found');
const detailPanelNode = document.getElementById('detailPanel');
if (!(detailPanelNode instanceof HTMLElement)) throw new Error('#detailPanel not found');
const presetCardGridNode = document.getElementById('presetCardGrid');
if (!(presetCardGridNode instanceof HTMLElement)) throw new Error('#presetCardGrid not found');
const contextCardGridNode = document.getElementById('contextCardGrid');
if (!(contextCardGridNode instanceof HTMLElement)) throw new Error('#contextCardGrid not found');
const probeRailNode = document.getElementById('probeRail');
if (!(probeRailNode instanceof HTMLElement)) throw new Error('#probeRail not found');

if (reportRequested) {
  clearNavigationReport();
  publishNavigationPhase('loading', requestId);
}

renderProbeRail();
renderPresetCards();
renderContextCards(null);
renderScenarioCards();

const ctx = createMeasureContext();

const container = document.createElement('div');
container.style.cssText = 'position:absolute;top:-9999px;visibility:hidden;white-space:nowrap';
document.body.appendChild(container);

// Collect all data: diffsBySize[size] = Map<diffValue, count across all fonts>
// Also track per-font to see if there's variance
const diffsBySizeFont = new Map(); // size → Map<font, diff[]>
const sizeSummaries = [];
const fontSummaries = [];
let totalMismatchObservations = 0;
const focusState = {
  size: parseFocusSizeParam(params.get('focusSize')),
  fontFamily: parseFocusFontParam(params.get('focusFont')),
};
let latestReport = null;

let out = '';

if (reportRequested) {
  publishNavigationPhase('measuring', requestId);
}

for (const fontFamily of fonts) {
  out += `<span class="heading">${fontFamily}</span>\n`;

  for (const sz of sizes) {
    ctx.font = `${sz}px ${fontFamily}`;
    let mismatches = 0;
    const diffs = [];

    // Batch: create all spans
    const spans = [];
    for (const e of emoji) {
      const span = document.createElement('span');
      span.style.font = `${sz}px ${fontFamily}`;
      span.style.display = 'inline-block';
      span.textContent = e;
      container.appendChild(span);
      spans.push(span);
    }

    // Read all
    for (let i = 0; i < emoji.length; i++) {
      const canvasW = ctx.measureText(emoji[i]).width;
      const domW = spans[i].getBoundingClientRect().width;
      const diff = canvasW - domW;

      if (Math.abs(diff) >= thresholdPx) {
        mismatches++;
        diffs.push({ emoji: emoji[i], canvasW, domW, diff });
        totalMismatchObservations++;
      }

      // Track per size+font
      if (!diffsBySizeFont.has(sz)) diffsBySizeFont.set(sz, new Map());
      const fontMap = diffsBySizeFont.get(sz);
      if (!fontMap.has(fontFamily)) fontMap.set(fontFamily, []);
      fontMap.get(fontFamily).push({ emoji: emoji[i], diff });
    }

    container.innerHTML = '';

    const cls = mismatches === 0 ? 'match' : 'mismatch';
    out += `  <span class="${cls}">${sz}px: ${emoji.length - mismatches}/${emoji.length} match</span>`;
    if (mismatches > 0) {
      const uniqueDiffs = [...new Set(diffs.map(d => d.diff.toFixed(2)))];
      out += ` <span class="dim">diffs: ${uniqueDiffs.map(d => (parseFloat(d) > 0 ? '+' : '') + d).join(', ')}</span>`;
    }
    out += '\n';
  }
  out += '\n';
}

// === KEY ANALYSIS: Are diffs constant across fonts for same size? ===
out += '<span class="heading">========== ANALYSIS: Font independence ==========</span>\n\n';

// For each size, compare the diff pattern across fonts
for (const sz of sizes) {
  const fontMap = diffsBySizeFont.get(sz);
  if (!fontMap) continue;

  // For each emoji, collect the diff from each font
  const emojiDiffsByFont = new Map(); // emoji → Map<font, diff>
  for (const [font, entries] of fontMap) {
    for (const { emoji: e, diff } of entries) {
      if (!emojiDiffsByFont.has(e)) emojiDiffsByFont.set(e, new Map());
      emojiDiffsByFont.get(e).set(font, diff);
    }
  }

  // Check: for each emoji, are all font diffs the same?
  let allSame = true;
  let maxVariance = 0;
  let worstEmoji = '';
  for (const [e, fontDiffs] of emojiDiffsByFont) {
    const vals = [...fontDiffs.values()];
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const variance = max - min;
    if (variance > 0.01) {
      allSame = false;
      if (variance > maxVariance) {
        maxVariance = variance;
        worstEmoji = e;
      }
    }
  }

  const cls = allSame ? 'match' : 'mismatch';
  const firstFont = fonts[0];
  const firstFontEntries = fontMap.get(firstFont) || [];
  const mismatchDiffs = firstFontEntries
    .filter(entry => Math.abs(entry.diff) >= thresholdPx)
    .map(entry => entry.diff);
  const uniqueCorrectionDiffs = [...new Set(mismatchDiffs.map(diff => Number(diff.toFixed(2))))];
  const sampleDiffs = [];
  for (const [e, fontDiffs] of emojiDiffsByFont) {
    const vals = [...fontDiffs.values()];
    if (Math.abs(vals[0]) >= thresholdPx) {
      sampleDiffs.push(`${e} ${vals[0] > 0 ? '+' : ''}${vals[0].toFixed(2)}`);
    }
    if (sampleDiffs.length >= 5) break;
  }

  out += `<span class="${cls}">${sz}px: ${allSame ? 'CONSTANT across fonts' : `VARIES (max variance: ${maxVariance.toFixed(2)}px on ${worstEmoji})`}</span>`;
  if (sampleDiffs.length > 0) {
    out += `  <span class="dim">${sampleDiffs.join(', ')}</span>`;
  }
  out += '\n';

  sizeSummaries.push({
    size: sz,
    mismatchedEmojiCount: mismatchDiffs.length,
    correctionDiffs: uniqueCorrectionDiffs,
    constantAcrossFonts: allSame,
    maxVariance: Number(maxVariance.toFixed(2)),
    worstEmoji: worstEmoji || null,
  });
}

// === Summary table: size → diff value (if constant) ===
out += '\n<span class="heading">========== CORRECTION TABLE (if constant) ==========</span>\n\n';
out += '<span class="key">size → canvas_width - dom_width (for emoji that mismatch)</span>\n\n';

for (const sz of sizes) {
  const fontMap = diffsBySizeFont.get(sz);
  if (!fontMap) continue;

  // Get diffs from first font (they should all be the same)
  const firstFont = fonts[0];
  const entries = fontMap.get(firstFont) || [];
  const mismatchDiffs = entries.filter(e => Math.abs(e.diff) >= thresholdPx);

  if (mismatchDiffs.length === 0) {
    out += `  ${sz}px: <span class="match">no correction needed</span>\n`;
  } else {
    const uniqueRounded = [...new Set(mismatchDiffs.map(d => d.diff.toFixed(2)))];
    out += `  ${sz}px: ${uniqueRounded.map(d => (parseFloat(d) > 0 ? '+' : '') + d + 'px').join(', ')} <span class="dim">(${mismatchDiffs.length}/${emoji.length} emoji)</span>\n`;
  }
}

// === Per-emoji detail at one size to show which emoji are affected ===
out += '\n<span class="heading">========== DETAIL: Which emoji mismatch at 16px ==========</span>\n\n';

const sz16 = diffsBySizeFont.get(16);
if (sz16) {
  const firstEntries = sz16.get(fonts[0]) || [];
  const matched = [];
  const mismatched = [];
  for (const { emoji: e, diff } of firstEntries) {
    if (Math.abs(diff) >= thresholdPx) {
      mismatched.push({ emoji: e, diff });
    } else {
      matched.push(e);
    }
  }
  out += `  Mismatched (${mismatched.length}): ${mismatched.map(m => `${m.emoji}(${m.diff > 0 ? '+' : ''}${m.diff.toFixed(1)})`).join(' ')}\n`;
  out += `  Matched (${matched.length}): ${matched.join(' ')}\n`;
}

const report = withRequestId({
  status: 'ready',
  presetKey: findMatchingPresetKey(),
  environment: getEnvironmentFingerprint(),
  emojiCount: emoji.length,
  fontCount: fonts.length,
  thresholdPx,
  sizes,
  focus: {
    size: focusState.size,
    fontFamily: focusState.fontFamily,
  },
  totalMismatchObservations,
  sizeSummaries,
  fontSummaries: buildFontSummaries(),
  constantAcrossAllSizes: sizeSummaries.every(summary => summary.constantAcrossFonts),
  fontIndependentSizes: sizeSummaries.filter(summary => summary.constantAcrossFonts).map(summary => summary.size),
  variableSizes: sizeSummaries.filter(summary => !summary.constantAcrossFonts).map(summary => summary.size),
  routeCount: buildScenarioCardDefinitions().length,
  assetPreviewSize: getAssetPreviewSize(),
});

document.body.removeChild(container);
latestReport = report;
outputNode.innerHTML = out;
summaryNode.hidden = false;
summaryNode.textContent = formatSummary(report);

renderFontSummaryGrid(report);

function createMeasureContext() {
  if (typeof OffscreenCanvas === 'function') {
    const offscreen = new OffscreenCanvas(1, 1);
    const offscreenCtx = offscreen.getContext('2d');
    if (offscreenCtx !== null) return offscreenCtx;
  }

  const canvas = document.createElement('canvas');
  const canvasCtx = canvas.getContext('2d');
  if (canvasCtx === null) throw new Error('2d context unavailable');
  return canvasCtx;
}

function withRequestId(report) {
  return requestId === undefined ? report : { ...report, requestId };
}

function findPresetParam(raw) {
  if (raw === null || raw.trim() === '') return null;
  return findEmojiProbePreset(raw.trim());
}

function parseNumberListParam(raw, fallback) {
  if (raw === null || raw.trim() === '') return fallback.slice();
  const parsed = raw
    .split(',')
    .map(part => Number.parseInt(part.trim(), 10))
    .filter(value => Number.isFinite(value) && value > 0);
  return parsed.length === 0 ? fallback.slice() : parsed;
}

function parseThresholdParam(raw, fallback) {
  if (raw === null || raw.trim() === '') return fallback;
  const parsed = Number.parseFloat(raw);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
}

function formatPresetSizes(values) {
  if (values.length === 0) return 'none';
  return `${values[0]}..${values[values.length - 1]} (${values.length})`;

function isEmojiPresetActive(preset) {
  return arraysEqual(sizes, preset.sizes) && thresholdPx === preset.threshold;
}

function findMatchingPresetKey() {
  const matched = EMOJI_PROBE_PRESETS.find(isEmojiPresetActive);
  return matched?.key;

function buildScenarioCardDefinitions() {
  const matchedPresetKey = findMatchingPresetKey();
  const query = buildScenarioQuery(matchedPresetKey);
  const rootPath = normalizeEmojiPath(location.pathname, 'root');
  const demoPath = normalizeEmojiPath(location.pathname, 'demo');
  const assetDemoPath = buildAssetAtlasPath('demo');
  const assetRootPath = buildAssetAtlasPath('root');
  const assetPreviewSize = getAssetPreviewSize();
  const assetQuery = `?size=${assetPreviewSize}`;
  return [
    {
      label: 'Root path',
      href: `${rootPath}${query}`,
      mode: matchedPresetKey ?? 'manual',
      focus: formatEmojiFocusLabel(),
      route: 'direct',
      path: rootPath,
    },
    {
      label: 'Demo alias',
      href: `${demoPath}${query}`,
      mode: matchedPresetKey ?? 'manual',
      focus: formatEmojiFocusLabel(),
      route: 'redirect',
      path: demoPath,
    },
    {
      label: 'Report run',
      href: `${demoPath}${appendReportQuery(query)}`,
      mode: matchedPresetKey ?? 'manual',
      focus: formatEmojiFocusLabel(),
      route: 'checker',
      path: `${demoPath}?report=1`,
    },
    {
      label: 'Asset atlas',
      href: `${assetRootPath}${assetQuery}`,
      mode: `${assetPreviewSize}px`,
      focus: 'all assets',
      route: 'atlas',
      path: assetRootPath,
    },
    {
      label: 'Asset report',
      href: `${assetDemoPath}${appendReportQuery(assetQuery)}`,
      mode: `${assetPreviewSize}px`,
      focus: 'all assets',
      route: 'atlas-check',
      path: `${assetDemoPath}?report=1`,
    },
  ];
}

function buildScenarioQuery(matchedPresetKey) {
  const next = new URLSearchParams();
  if (matchedPresetKey !== undefined) {
    next.set('preset', matchedPresetKey);
  } else {
    next.set('sizes', sizes.join(','));
    next.set('threshold', String(thresholdPx));
  }
  if (focusState.size !== null) next.set('focusSize', String(focusState.size));
  if (focusState.fontFamily !== null) next.set('focusFont', compactFontLabel(focusState.fontFamily));
  const query = next.toString();
  return query.length === 0 ? '' : `?${query}`;
}

function appendReportQuery(query) {
  const next = new URLSearchParams(query.startsWith('?') ? query.slice(1) : query);
  next.set('report', '1');
  return `?${next.toString()}`;
}

function getAssetPreviewSize() {
  const anchorSize = focusState.size ?? sizes[Math.floor(sizes.length / 2)] ?? defaultSizes[Math.floor(defaultSizes.length / 2)] ?? 96;
  return pickNearestAssetPreviewSize(anchorSize);
}

function pickNearestAssetPreviewSize(value) {
  let best = ASSET_PREVIEW_SIZES[0];
  let bestDistance = Math.abs(best - value);
  for (let index = 1; index < ASSET_PREVIEW_SIZES.length; index++) {
    const candidate = ASSET_PREVIEW_SIZES[index];
    const distance = Math.abs(candidate - value);
    if (distance < bestDistance) {
      best = candidate;
      bestDistance = distance;
    }
  }
  return best;
}

function buildAssetAtlasPath(target) {
  return target === 'root' ? '/assets' : '/assets/';
}

function buildAssetAtlasHref(assetKey) {
  const next = new URLSearchParams();
  next.set('asset', assetKey);
  next.set('size', String(getAssetPreviewSize()));
  return `${buildAssetAtlasPath('demo')}?${next.toString()}`;
}

function normalizeEmojiPath(pathname, target) {
  if (target === 'demo') {
    return pathname.includes('/demos/')
      ? pathname.replace(/\/emoji-test\/?$/, '/emoji-test')
      : pathname.replace(/\/emoji-test\/?$/, '/demos/emoji-test');
  }
  return pathname.includes('/demos/')
    ? pathname.replace(/\/demos\/emoji-test\/?$/, '/emoji-test')
    : pathname.replace(/\/emoji-test\/?$/, '/emoji-test');
}

function buildFontSummaries() {
  fontSummaries.length = 0;

  for (const fontFamily of fonts) {
    let totalMismatches = 0;
    let maxAbsDiff = 0;
    let worstEmoji = null;
    let worstSize = null;
    const mismatchSizes = [];
    const correctionDiffs = new Set();

    for (const sz of sizes) {
      const fontMap = diffsBySizeFont.get(sz);
      const entries = fontMap?.get(fontFamily) ?? [];
      const mismatches = entries.filter(entry => Math.abs(entry.diff) >= thresholdPx);
      if (mismatches.length === 0) continue;

      mismatchSizes.push(sz);
      totalMismatches += mismatches.length;
      for (const mismatch of mismatches) {
        const rounded = Number(mismatch.diff.toFixed(2));
        correctionDiffs.add(rounded);
        const absDiff = Math.abs(mismatch.diff);
        if (absDiff > maxAbsDiff) {
          maxAbsDiff = absDiff;
          worstEmoji = mismatch.emoji;
          worstSize = sz;
        }
      }
    }

    fontSummaries.push({
      fontFamily,
      mismatchSizeCount: mismatchSizes.length,
      mismatchSizes,
      totalMismatches,
      maxAbsDiff: Number(maxAbsDiff.toFixed(2)),
      worstEmoji,
      worstSize,
      correctionDiffs: [...correctionDiffs].sort((left, right) => left - right),
    });
  }

  return fontSummaries;
}

function buildProbeHref(options) {
  const next = new URLSearchParams();
  if (options.presetKey !== undefined) {
    next.set('preset', options.presetKey);
  } else {
    if (options.sizes !== undefined) next.set('sizes', options.sizes.join(','));
    if (options.threshold !== undefined) next.set('threshold', String(options.threshold));
  }
  const query = next.toString();
  return query.length === 0 ? location.pathname : `${location.pathname}?${query}`;
}

  row.append(left, right);
  return row;

function arraysEqual(left, right) {
  if (left.length !== right.length) return false;
  for (let index = 0; index < left.length; index++) {
    if (left[index] !== right[index]) return false;
  }
  return true;
}

function formatSummary(report) {
  const lines = [
    report.presetKey === undefined ? null : `preset ${report.presetKey}`,
    `threshold ${report.thresholdPx.toFixed(2)}px`,
    `sizes ${report.sizes.join(', ')}`,
    `focus ${formatEmojiFocusLabel(report.focus)}`,
    `emoji ${report.emojiCount}  fonts ${report.fontCount}  mismatch-observations ${report.totalMismatchObservations}`,
    report.constantAcrossAllSizes
      ? 'all sampled sizes stay font-constant'
      : `variable sizes ${report.variableSizes.join(', ') || 'none'}`,
  ].filter(Boolean);

  for (const summary of report.sizeSummaries) {
    lines.push(
      `${summary.size}px  mismatch ${summary.mismatchedEmojiCount}  ` +
      `${summary.constantAcrossFonts ? 'constant' : `varies ${summary.maxVariance.toFixed(2)}px`}  ` +
      `corr ${summary.correctionDiffs.length === 0 ? 'none' : summary.correctionDiffs.map(diff => `${diff > 0 ? '+' : ''}${diff.toFixed(2)}`).join(', ')}`,
    );
  }

  return lines.join('\n');
}

function formatEmojiFocusLabel(focus = focusState) {
  const parts = [];
  if (focus.size !== null) parts.push(`${focus.size}px`);
  if (focus.fontFamily !== null) parts.push(compactFontLabel(focus.fontFamily));
  return parts.length === 0 ? 'all sizes x fonts' : parts.join(' x ');
}

function describeEmojiFocusScope() {
  if (focusState.size !== null && focusState.fontFamily !== null) return 'single size x font';
  if (focusState.size !== null) return 'size drilldown';
  if (focusState.fontFamily !== null) return 'font drilldown';
  return 'matrix overview';
}

function buildDetailTitle() {
  if (focusState.size !== null && focusState.fontFamily !== null) {
    return `${focusState.size}px × ${compactFontLabel(focusState.fontFamily)}`
  }
  if (focusState.size !== null) return `${focusState.size}px drilldown`
  return `${compactFontLabel(focusState.fontFamily)} drilldown`
}

function buildDetailCards(report) {
  if (focusState.size !== null && focusState.fontFamily !== null) {
    return [
      createIntersectionDetailCard(report, focusState.size, focusState.fontFamily),
    ];
  }

  if (focusState.size !== null) {
    return fonts.map(fontFamily => createSizeDetailCard(report, focusState.size, fontFamily));
  }

  return sizes.map(size => createFontDetailCard(report, size, focusState.fontFamily));
}

function createSummaryCard(summary) {
  const element = document.createElement('article');
  element.className = summary.constantAcrossFonts ? 'summary-card is-constant' : 'summary-card is-variable';
  if (focusState.size === summary.size) element.className += ' is-selected';
  element.tabIndex = 0;
  element.role = 'button';
  element.addEventListener('click', () => {
    focusState.size = focusState.size === summary.size ? null : summary.size;
    rerenderFocus();
  });

  const sizeRow = document.createElement('div');
  sizeRow.className = 'summary-card-size';
  const sizeLabel = document.createElement('span');
  sizeLabel.textContent = `${summary.size}px`;
  const status = document.createElement('span');
  status.className = summary.constantAcrossFonts ? 'summary-card-status is-constant' : 'summary-card-status is-variable';
  status.textContent = summary.constantAcrossFonts ? 'constant' : 'varies';
  sizeRow.append(sizeLabel, status);

  const mismatchRow = document.createElement('div');
  mismatchRow.className = 'summary-card-meta';
  mismatchRow.textContent = `mismatch ${summary.mismatchedEmojiCount}/${emoji.length}`;

  const corrRow = document.createElement('div');
  corrRow.className = 'summary-card-corr';
  corrRow.textContent =
    `corr ${summary.correctionDiffs.length === 0 ? 'none' : summary.correctionDiffs.map(diff => `${diff > 0 ? '+' : ''}${diff.toFixed(2)}px`).join(', ')}`;

  const varianceRow = document.createElement('div');
  varianceRow.className = 'summary-card-meta';
  varianceRow.textContent = summary.constantAcrossFonts
    ? 'variance 0.00px'
    : `variance ${summary.maxVariance.toFixed(2)}px`;

  element.append(sizeRow, mismatchRow, corrRow, varianceRow);
  if (summary.worstEmoji !== null) {
    const worstRow = document.createElement('div');
    worstRow.className = 'summary-card-worst';
    worstRow.textContent = `worst ${summary.worstEmoji}`;
    element.append(worstRow);
  }
  return element;
}

function createFontSummaryCard(summary) {
  const tone =
    summary.totalMismatches === 0
      ? 'clean'
      : summary.mismatchSizeCount >= Math.ceil(sizes.length / 2)
        ? 'hot'
        : 'noisy';
  const badgeText =
    tone === 'clean'
      ? 'clean'
      : tone === 'hot'
        ? 'wide spread'
        : 'localized';

  const element = document.createElement('article');
  element.className = `font-card is-${tone}`;
  if (focusState.fontFamily === summary.fontFamily) element.className += ' is-selected';
  element.tabIndex = 0;
  element.role = 'button';
  element.addEventListener('click', () => {
    focusState.fontFamily = focusState.fontFamily === summary.fontFamily ? null : summary.fontFamily;
    rerenderFocus();
  });

  const titleRow = document.createElement('div');
  titleRow.className = 'font-card-title';
  const title = document.createElement('span');
  title.textContent = compactFontLabel(summary.fontFamily);
  const badge = document.createElement('span');
  badge.className = `font-card-badge is-${tone}`;
  badge.textContent = badgeText;
  titleRow.append(title, badge);

  const mismatchSizes = summary.mismatchSizes.length === 0 ? 'none' : summary.mismatchSizes.join(', ');
  const correctionDiffs = summary.correctionDiffs.length === 0
    ? 'none'
    : summary.correctionDiffs.map(diff => `${diff > 0 ? '+' : ''}${diff.toFixed(2)}`).join(', ');

  element.append(
    titleRow,
    createFontSummaryRow('sizes', mismatchSizes),
    createFontSummaryRow('mismatch', String(summary.totalMismatches)),
    createFontSummaryRow('max |diff|', `${summary.maxAbsDiff.toFixed(2)}px`),
    createFontSummaryRow('corr', correctionDiffs),
  );

  if (summary.worstEmoji !== null && summary.worstSize !== null) {
    const worstRow = document.createElement('div');
    worstRow.className = 'font-card-worst';
    worstRow.textContent = `worst ${summary.worstEmoji} @ ${summary.worstSize}px`;
    element.append(worstRow);
  }

  return element;
}

function createFontSummaryRow(label, value) {
  const row = document.createElement('div');
  row.className = 'font-card-row';
  const left = document.createElement('span');
  left.textContent = label;
  const right = document.createElement('span');
  right.textContent = value;
  row.append(left, right);
  return row;
}

function compactFontLabel(fontFamily) {
  const normalized = fontFamily.replaceAll('"', '');
  return normalized.split(',')[0] ?? normalized;
}

function parseFocusSizeParam(raw) {
  if (raw === null || raw.trim() === '') return null;
  const parsed = Number.parseInt(raw, 10);
  if (!Number.isFinite(parsed)) return null;
  return sizes.includes(parsed) ? parsed : null;
}

function parseFocusFontParam(raw) {
  if (raw === null || raw.trim() === '') return null;
  const normalized = raw.trim().toLowerCase();
  for (const fontFamily of fonts) {
    if (compactFontLabel(fontFamily).toLowerCase() === normalized) return fontFamily;
  }
  return null;
}

function rerenderFocus() {
  if (latestReport === null) return;
  renderSummaryGrid(latestReport);
  renderFontSummaryGrid(latestReport);
  renderDetailPanel(latestReport);
  renderScenarioCards();
}

function clearFocusSelection() {
  focusState.size = null;
  focusState.fontFamily = null;
  rerenderFocus();
}

function getEntriesForFocus(size, fontFamily) {
  const fontMap = diffsBySizeFont.get(size);
  return fontMap?.get(fontFamily) ?? [];
}

function getMismatchEntries(size, fontFamily) {
  return getEntriesForFocus(size, fontFamily).filter(entry => Math.abs(entry.diff) >= thresholdPx);
}

function formatCorrectionDiffs(entries) {
  const values = [...new Set(entries.map(entry => Number(entry.diff.toFixed(2))))];
  return values.length === 0 ? 'none' : values.map(diff => `${diff > 0 ? '+' : ''}${diff.toFixed(2)}`).join(', ');
}

function createIntersectionDetailCard(report, size, fontFamily) {
  const mismatches = getMismatchEntries(size, fontFamily);
  const card = createDetailCard(`${size}px × ${compactFontLabel(fontFamily)}`);
  const summary = report.sizeSummaries.find(item => item.size === size);
  card.append(
    createDetailRow('mismatch', `${mismatches.length}/${emoji.length}`),
    createDetailRow('corr', formatCorrectionDiffs(mismatches)),
    createDetailRow('size mode', summary?.constantAcrossFonts ? 'constant' : 'variable'),
  );

  const strip = document.createElement('div');
  strip.className = 'detail-chip-strip';
  if (mismatches.length === 0) {
    strip.append(createDetailChip('no mismatches'));
  } else {
    for (let index = 0; index < mismatches.length; index++) {
      const mismatch = mismatches[index];
      strip.append(createDetailChip(`${mismatch.emoji}${mismatch.diff > 0 ? '+' : ''}${mismatch.diff.toFixed(2)}`));
    }
  }
  card.append(strip);
  return card;
}

function createSizeDetailCard(report, size, fontFamily) {
  const mismatches = getMismatchEntries(size, fontFamily);
  const card = createDetailCard(compactFontLabel(fontFamily));
  const fontSummary = report.fontSummaries.find(item => item.fontFamily === fontFamily);
  card.append(
    createDetailRow('mismatch', `${mismatches.length}/${emoji.length}`),
    createDetailRow('corr', formatCorrectionDiffs(mismatches)),
    createDetailRow('font spread', fontSummary?.mismatchSizes.length === 0 ? 'clean' : fontSummary.mismatchSizes.join(', ')),
  );
  const strip = document.createElement('div');
  strip.className = 'detail-chip-strip';
  strip.append(
    createDetailChip(mismatches.length === 0 ? 'stable' : `${mismatches.slice(0, 6).map(item => item.emoji).join(' ')}`),
  );
  card.append(strip);
  return card;
}

function createFontDetailCard(report, size, fontFamily) {
  const mismatches = getMismatchEntries(size, fontFamily);
  const card = createDetailCard(`${size}px`);
  const sizeSummary = report.sizeSummaries.find(item => item.size === size);
  card.append(
    createDetailRow('mismatch', `${mismatches.length}/${emoji.length}`),
    createDetailRow('corr', formatCorrectionDiffs(mismatches)),
    createDetailRow('variance', sizeSummary?.constantAcrossFonts ? '0.00px' : `${sizeSummary?.maxVariance.toFixed(2) ?? '0.00'}px`),
  );
  const strip = document.createElement('div');
  strip.className = 'detail-chip-strip';
  strip.append(
    createDetailChip(mismatches.length === 0 ? 'stable' : `${mismatches.slice(0, 6).map(item => item.emoji).join(' ')}`),
  );
  card.append(strip);
  return card;
}

function createDetailCard(title) {
  const card = document.createElement('article');
  card.className = 'detail-card';
  const heading = document.createElement('div');
  heading.className = 'detail-card-title';
  heading.textContent = title;
  card.append(heading);
  return card;
}

function createDetailRow(label, value) {
  const row = document.createElement('div');
  row.className = 'detail-card-row';
  const labelNode = document.createElement('span');
  labelNode.className = 'detail-card-label';
  labelNode.textContent = label;
  const valueNode = document.createElement('span');
  valueNode.className = 'detail-card-value';
  valueNode.textContent = value;
  row.append(labelNode, valueNode);
  return row;
}

function createDetailChip(text) {
  const chip = document.createElement('span');
  chip.className = 'detail-chip';
  chip.textContent = text;
  return chip;
}

function getEnvironmentFingerprint() {
  return {
    userAgent: navigator.userAgent,
    devicePixelRatio: window.devicePixelRatio,
    viewport: {
      innerWidth: window.innerWidth,
      innerHeight: window.innerHeight,
      outerWidth: window.outerWidth,
      outerHeight: window.outerHeight,
      visualViewportScale: window.visualViewport?.scale ?? null,
    },
    screen: {
      width: window.screen.width,
      height: window.screen.height,
      availWidth: window.screen.availWidth,
      availHeight: window.screen.availHeight,
      colorDepth: window.screen.colorDepth,
      pixelDepth: window.screen.pixelDepth,
    },
  };
}
</script>
