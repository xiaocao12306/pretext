<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Editorial pretext demo: animated orbs, live multi-column text flow, and zero DOM measurements.">
  <title>Mockup 147 — The Editorial Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      color: #e8e4dc; height: 100vh; overflow: hidden;
    }
    body { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif; }

    #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .line {
      position: absolute; white-space: pre; z-index: 1; color: #e8e4dc;
      user-select: text; -webkit-user-select: text;
    }

    .headline-line {
      position: absolute; white-space: pre;
      font-weight: 700; color: #fff; letter-spacing: -0.5px; z-index: 2;
      user-select: text; -webkit-user-select: text;
    }

    .drop-cap {
      position: absolute; pointer-events: none; z-index: 2;
      font-weight: 700; color: #c4a35a;
    }

    .orb {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 10;
      will-change: transform;
    }
    .pullquote-box {
      position: absolute; pointer-events: none; z-index: 3;
      border-left: 3px solid #6b5a3d; padding-left: 14px;
    }
    .pullquote-line {
      position: absolute; white-space: pre;
      font-style: italic; color: #b8a070;
      user-select: text; -webkit-user-select: text;
    }

    .hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font: 400 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.22); z-index: 100;
      background: rgba(0,0,0,0.45); padding: 8px 18px; border-radius: 999px;
      pointer-events: none; white-space: nowrap;
    }
    .telemetry {
      position: fixed; top: 16px; right: 16px; z-index: 101;
      min-width: 260px; max-width: min(360px, calc(100vw - 32px));
      padding: 12px 14px; border-radius: 16px;
      background: rgba(7, 8, 12, 0.7); border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 50px rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.82);
      font: 500 12px/1.45 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      white-space: pre-wrap; pointer-events: none;
      backdrop-filter: blur(10px);
    }
    .telemetry[hidden] { display: none; }
    .summary-panel {
      position: fixed; left: 16px; bottom: 104px; z-index: 101;
      min-width: 280px; max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px; border-radius: 16px;
      background: rgba(7, 8, 12, 0.72); border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 50px rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.82);
      font: 500 12px/1.45 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      white-space: pre-wrap; pointer-events: none;
      backdrop-filter: blur(10px);
    }
    .preset-card-grid {
      position: fixed; right: 16px; bottom: 16px; z-index: 101;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      width: min(380px, calc(100vw - 32px));
    }
    .preset-card {
      display: block;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(7, 8, 12, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 50px rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.84);
      text-decoration: none;
      backdrop-filter: blur(10px);
    }
    .preset-card:hover {
      border-color: rgba(255,255,255,0.22);
      color: #fff;
    }
    .preset-card.is-active {
      background: rgba(196,163,90,0.16);
      border-color: rgba(196,163,90,0.45);
      color: #fff4d7;
    }
    .preset-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 6px;
    }
    .preset-card-title {
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .preset-card-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(196,163,90,0.18);
      color: #fff4d7;
      font: 700 10px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .preset-card-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font: 500 11px/1.45 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .preset-card-row + .preset-card-row {
      margin-top: 2px;
    }
    .preset-card-label {
      color: rgba(255,255,255,0.56);
    }
    .preset-card-value {
      color: rgba(255,255,255,0.88);
      text-align: right;
    }
    .probe-rail {
      position: fixed; left: 16px; bottom: 16px; z-index: 101;
      display: flex; flex-wrap: wrap; gap: 8px;
      max-width: min(540px, calc(100vw - 32px));
      padding: 12px;
      border-radius: 18px;
      background: rgba(7, 8, 12, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 50px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }
    .probe-link {
      display: inline-flex; align-items: center; min-height: 30px;
      padding: 0 12px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.84);
      text-decoration: none;
      font: 600 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }
    .probe-link:hover { border-color: rgba(255,255,255,0.22); color: #fff; }
    .probe-link.is-active {
      background: rgba(196,163,90,0.18);
      border-color: rgba(196,163,90,0.45);
      color: #fff4d7;
    }
    .credit {
      position: fixed; right: 16px; bottom: 12px; z-index: 100;
      font: 400 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
    }
    .credit:hover { color: rgba(255,255,255,0.44); }

    @media (max-width: 760px) {
      .hint {
        display: none;
      }

      .credit {
        display: none;
      }

      .telemetry {
        top: auto; right: 12px; bottom: 12px;
        min-width: 0; max-width: calc(100vw - 24px);
        font-size: 11px; line-height: 1.4;
      }

      .summary-panel {
        left: 12px; bottom: 86px;
        min-width: 0; max-width: calc(100vw - 24px);
        font-size: 11px; line-height: 1.4;
      }

      .preset-card-grid {
        right: 12px; bottom: 160px;
        width: calc(100vw - 24px);
        grid-template-columns: 1fr;
      }

      .probe-rail {
        left: 12px; bottom: 12px; max-width: calc(100vw - 24px);
        padding: 10px;
      }

      .probe-link {
        min-height: 28px; padding: 0 10px; font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="hintPill" class="hint">Drag the orbs &middot; Click to pause &middot; Zero DOM reads</div>
  <pre id="telemetryPanel" class="telemetry" hidden></pre>
  <pre id="summaryPanel" class="summary-panel" aria-live="polite"></pre>
  <section id="presetCardGrid" class="preset-card-grid" aria-label="Editorial engine preset cards"></section>
  <nav id="probeRail" class="probe-rail" aria-label="Editorial engine probe presets"></nav>
  <a class="credit" href="https://x.com/somnai_dreams" target="_blank" rel="noreferrer">Made by @somnai_dreams</a>

  <script type="module" src="./editorial-engine.ts"></script>
</body>
</html>
