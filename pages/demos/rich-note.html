<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rich text rendered as text runs, links, code spans, and atomic chips, with live width changes powered by Pretext.">
  <title>Rich Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root {
      color-scheme: light;
      --page: #f5f1ea;
      --panel: #fffdf8;
      --ink: #201b18;
      --muted: #6d645d;
      --rule: #d8cec3;
      --accent: #955f3b;
      --note-width: 556px;
      --note-content-width: 516px;
    }
    html, body {
      min-height: 100%;
      background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
      color: var(--ink);
    }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    .page {
      width: min(940px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    .intro {
      width: min(720px, 100%);
      margin: 0 auto 20px;
    }
    .eyebrow {
      margin: 0 0 8px;
      font: 12px/1.2 "SF Mono", ui-monospace, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font: 700 34px/1.08 Georgia, "Times New Roman", serif;
    }
    .lede {
      margin: 10px 0 0;
      max-width: 63ch;
      font: 400 15px/1.52 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--muted);
    }
    .toolbar {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--rule);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .probe-rail {
      width: min(720px, 100%);
      margin: 0 auto 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--rule);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .probe-link {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--rule) 78%);
      background: color-mix(in srgb, var(--panel) 88%, white 12%);
      color: var(--ink);
      text-decoration: none;
      font: 600 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }
    .probe-link:hover {
      border-color: color-mix(in srgb, var(--accent) 46%, var(--rule) 54%);
    }
    .probe-link.is-active {
      background: color-mix(in srgb, var(--accent) 14%, white 86%);
      border-color: color-mix(in srgb, var(--accent) 56%, var(--rule) 44%);
      color: color-mix(in srgb, var(--accent) 84%, black 16%);
    }
    .utility-grid {
      width: min(720px, 100%);
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }
    .summary-panel {
      margin: 0;
      padding: 16px 18px;
      border: 1px solid var(--rule);
      border-radius: 20px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
      color: var(--ink);
      font: 12px/1.45 "SF Mono", ui-monospace, monospace;
      white-space: pre-wrap;
    }
    .route-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .route-card {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--rule);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .route-card:hover {
      border-color: color-mix(in srgb, var(--accent) 35%, var(--rule) 65%);
    }
    .route-card-title {
      margin: 0 0 6px;
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .route-card-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font: 12px/1.45 "SF Mono", ui-monospace, monospace;
    }
    .route-card-row + .route-card-row {
      margin-top: 2px;
    }
    .route-card-label {
      color: var(--muted);
    }
    .route-card-value {
      text-align: right;
    }
    .preset-card-grid {
      width: min(720px, 100%);
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .preset-card {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--rule);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .preset-card:hover {
      border-color: color-mix(in srgb, var(--accent) 35%, var(--rule) 65%);
    }
    .preset-card.is-active {
      background: color-mix(in srgb, rgba(149,95,59,0.12) 72%, white 28%);
      border-color: color-mix(in srgb, var(--accent) 54%, var(--rule) 46%);
    }
    .preset-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 6px;
    }
    .preset-card-title {
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .preset-card-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 18%, white 82%);
      color: color-mix(in srgb, var(--accent) 88%, black 12%);
      font: 700 10px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .preset-card-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font: 12px/1.45 "SF Mono", ui-monospace, monospace;
    }
    .preset-card-row + .preset-card-row {
      margin-top: 2px;
    }
    .preset-card-label {
      color: var(--muted);
    }
    .preset-card-value {
      text-align: right;
    }
    .toolbar-label {
      font: 600 11px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .toolbar-value {
      font: 600 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--muted);
    }
    .preview {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
    .note-shell {
      width: var(--note-width);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 20px;
      background: color-mix(in srgb, var(--panel) 94%, white 6%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .note-body {
      position: relative;
      width: var(--note-content-width);
      min-height: 34px;
    }
    .line-row {
      position: absolute;
      left: 0;
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      gap: 0;
      width: max-content;
    }
    .frag {
      display: inline-block;
      white-space: pre;
      font: 500 17px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      vertical-align: baseline;
    }
    .frag--link {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }
    .frag--code {
      padding: 2px 7px 3px;
      border-radius: 9px;
      background: rgba(17, 31, 43, 0.08);
      font: 600 14px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      min-height: 24px;
      border-radius: 999px;
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      white-space: nowrap;
      border: 1px solid transparent;
      vertical-align: baseline;
      transform: translateY(-1px);
    }
    .chip--mention { background: rgba(21, 90, 136, 0.12); color: #155a88; border-color: rgba(21, 90, 136, 0.12); }
    .chip--status { background: rgba(196, 129, 20, 0.12); color: #916207; border-color: rgba(196, 129, 20, 0.14); }
    .chip--priority { background: rgba(176, 44, 44, 0.1); color: #8e2323; border-color: rgba(176, 44, 44, 0.14); }
    .chip--time { background: rgba(70, 118, 77, 0.11); color: #355f38; border-color: rgba(70, 118, 77, 0.14); }
    .chip--count { background: rgba(67, 57, 122, 0.1); color: #483e83; border-color: rgba(67, 57, 122, 0.13); }
    @media (max-width: 900px) {
      .preview {
        justify-content: center;
      }
    }
    @media (max-width: 640px) {
      .page {
        width: min(100vw - 20px, 940px);
        padding-top: 22px;
      }
      h1 { font-size: 30px; }
      .toolbar {
        grid-template-columns: 1fr;
        justify-items: stretch;
        border-radius: 22px;
      }
      .utility-grid {
        grid-template-columns: 1fr;
      }
      .toolbar-label,
      .toolbar-value {
        text-align: left;
      }
      .note-shell {
        border-radius: 24px;
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="intro">
      <p class="eyebrow">Demo</p>
      <h1>Rich Text</h1>
      <p class="lede">
        Rich text rendered as text runs, links, code spans, and atomic chips.
        Adjust the text width to watch the chips stay whole while the surrounding text and code keep wrapping naturally when space gets tight.
      </p>
    </section>

    <div class="toolbar">
      <div class="toolbar-label">Text Width</div>
      <input id="width-slider" type="range" min="260" max="760" value="516">
      <span class="toolbar-value" id="width-value">516px</span>
    </div>
    <nav id="probeRail" class="probe-rail" aria-label="Rich note presets"></nav>
    <section class="utility-grid" aria-label="Rich note summary and links">
      <pre id="summaryPanel" class="summary-panel" aria-live="polite"></pre>
      <section id="routeCardGrid" class="route-card-grid" aria-label="Rich note scenario links"></section>
    </section>
    <section id="presetCardGrid" class="preset-card-grid" aria-label="Rich note preset cards"></section>

    <section class="preview">
      <article class="note-shell" id="note-shell">
        <div class="note-body" id="note-body"></div>
      </article>
    </section>
  </main>
  <script type="module" src="./rich-note.ts"></script>
</body>
</html>
