<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretext Demo — Accordion</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
        --page: #f5f2ec;
        --panel: #fffdf9;
        --ink: #1e1a18;
        --muted: #6e655f;
        --rule: #d8cec3;
        --accent: #955f3b;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .page {
        width: min(780px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }
      .probe-rail {
        margin: 0 0 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--rule);
        border-radius: 18px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
      }
      .probe-link {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--rule) 78%);
        background: color-mix(in srgb, var(--panel) 88%, white 12%);
        color: var(--ink);
        text-decoration: none;
        font: 600 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
        white-space: nowrap;
      }
      .probe-link:hover {
        border-color: color-mix(in srgb, var(--accent) 46%, var(--rule) 54%);
      }
      .probe-link.is-active {
        background: color-mix(in srgb, var(--accent) 14%, white 86%);
        border-color: color-mix(in srgb, var(--accent) 56%, var(--rule) 44%);
        color: color-mix(in srgb, var(--accent) 84%, black 16%);
      }
      .utility-grid {
        margin: 0 0 18px;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
        gap: 16px;
      }
      .summary-panel {
        margin: 0;
        padding: 16px 18px;
        border: 1px solid var(--rule);
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
        color: var(--ink);
        font: 12px/1.45 "SF Mono", ui-monospace, monospace;
        white-space: pre-wrap;
      }
      .route-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }
      .route-card {
        display: block;
        padding: 12px 14px;
        border: 1px solid var(--rule);
        border-radius: 18px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
      }
      .route-card:hover {
        border-color: color-mix(in srgb, var(--accent) 35%, var(--rule) 65%);
      }
      .route-card-title {
        margin: 0 0 6px;
        font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .route-card-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font: 12px/1.45 "SF Mono", ui-monospace, monospace;
      }
      .route-card-row + .route-card-row {
        margin-top: 2px;
      }
      .route-card-label {
        color: var(--muted);
      }
      .route-card-value {
        text-align: right;
      }
      .preset-card-grid {
        margin: 0 0 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      .preset-card {
        display: block;
        padding: 12px 14px;
        border: 1px solid var(--rule);
        border-radius: 18px;
        background: color-mix(in srgb, var(--panel) 92%, white 8%);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
      }
      .preset-card:hover {
        border-color: color-mix(in srgb, var(--accent) 35%, var(--rule) 65%);
      }
      .preset-card.is-active {
        background: color-mix(in srgb, rgba(149,95,59,0.12) 72%, white 28%);
        border-color: color-mix(in srgb, var(--accent) 54%, var(--rule) 46%);
      }
      .preset-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 6px;
      }
      .preset-card-title {
        font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .preset-card-badge {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 18%, white 82%);
        color: color-mix(in srgb, var(--accent) 88%, black 12%);
        font: 700 10px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .preset-card-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font: 12px/1.45 "SF Mono", ui-monospace, monospace;
      }
      .preset-card-row + .preset-card-row {
        margin-top: 2px;
      }
      .preset-card-label {
        color: var(--muted);
      }
      .preset-card-value {
        text-align: right;
      }

      .intro {
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 8px;
        font: 12px/1.2 "SF Mono", ui-monospace, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font: 700 30px/1.08 Georgia, "Times New Roman", serif;
      }

      .intro p {
        margin: 10px 0 0;
        max-width: 58ch;
        line-height: 1.45;
        color: var(--muted);
      }

      .stack {
        border: 1px solid var(--rule);
        border-radius: 18px;
        background: var(--panel);
        overflow: hidden;
      }

      .accordion-item + .accordion-item {
        border-top: 1px solid var(--rule);
      }

      .accordion-toggle {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 14px;
        align-items: center;
        width: 100%;
        padding: 18px 20px;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .accordion-toggle:hover {
        background: rgb(0 0 0 / 0.02);
      }

      .accordion-heading {
        min-width: 0;
      }

      .accordion-title {
        display: block;
        font: 600 17px/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .accordion-meta {
        justify-self: end;
        font: 12px/1.2 "SF Mono", ui-monospace, monospace;
        color: var(--muted);
        white-space: nowrap;
      }

      .accordion-glyph {
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        color: var(--accent);
        transition: transform 180ms ease;
      }

      .accordion-glyph::before {
        content: "";
        width: 0;
        height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 7px solid currentColor;
      }

      .accordion-body {
        height: 0;
        overflow: clip;
        transition: height 180ms ease;
      }

      .accordion-inner {
        padding: 0 20px 18px;
      }

      .accordion-copy {
        margin: 0;
        font: 16px/26px "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--ink);
      }

      @media (prefers-reduced-motion: reduce) {
        .accordion-glyph,
        .accordion-body {
          transition: none;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100vw - 20px, 780px);
          padding-top: 22px;
        }
        .utility-grid {
          grid-template-columns: 1fr;
        }

        .accordion-toggle {
          gap: 10px;
        }

        .accordion-meta {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">Demo</p>
        <h1>Finally sane accordion</h1>
        <p>
          The section heights have been calculated without measuring the DOM and
          without CSS hacks.
        </p>
      </section>
      <nav id="probeRail" class="probe-rail" aria-label="Accordion presets"></nav>
      <section class="utility-grid" aria-label="Accordion summary and links">
        <pre id="summaryPanel" class="summary-panel" aria-live="polite"></pre>
        <section id="routeCardGrid" class="route-card-grid" aria-label="Accordion scenario links"></section>
      </section>
      <section id="presetCardGrid" class="preset-card-grid" aria-label="Accordion preset cards"></section>

      <section id="list" class="stack" aria-label="Accordion demo">
        <article class="accordion-item">
          <button type="button" class="accordion-toggle" aria-expanded="false">
            <span class="accordion-heading">
              <span class="accordion-title"></span>
            </span>
            <span class="accordion-meta"></span>
            <span class="accordion-glyph" aria-hidden="true"></span>
          </button>
          <div class="accordion-body">
            <div class="accordion-inner">
              <p class="accordion-copy"></p>
            </div>
          </div>
        </article>

        <article class="accordion-item">
          <button type="button" class="accordion-toggle" aria-expanded="false">
            <span class="accordion-heading">
              <span class="accordion-title"></span>
            </span>
            <span class="accordion-meta"></span>
            <span class="accordion-glyph" aria-hidden="true"></span>
          </button>
          <div class="accordion-body">
            <div class="accordion-inner">
              <p class="accordion-copy"></p>
            </div>
          </div>
        </article>

        <article class="accordion-item">
          <button type="button" class="accordion-toggle" aria-expanded="false">
            <span class="accordion-heading">
              <span class="accordion-title"></span>
            </span>
            <span class="accordion-meta"></span>
            <span class="accordion-glyph" aria-hidden="true"></span>
          </button>
          <div class="accordion-body">
            <div class="accordion-inner">
              <p class="accordion-copy"></p>
            </div>
          </div>
        </article>

        <article class="accordion-item">
          <button type="button" class="accordion-toggle" aria-expanded="false">
            <span class="accordion-heading">
              <span class="accordion-title"></span>
            </span>
            <span class="accordion-meta"></span>
            <span class="accordion-glyph" aria-hidden="true"></span>
          </button>
          <div class="accordion-body">
            <div class="accordion-inner">
              <p class="accordion-copy"></p>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="./accordion.ts"></script>
  </body>
</html>
